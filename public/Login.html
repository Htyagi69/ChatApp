<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — ChatApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0f;
    padding: 20px;
    position: relative;
  }

  /* Ambient glow blobs */
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    top: -120px; left: -100px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(247,106,138,0.08) 0%, transparent 70%);
    bottom: -100px; right: -80px;
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #161618;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 44px 40px 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
    position: relative;
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,106,247,0.6), transparent);
    border-radius: 1px;
  }

  .logo {
    width: 44px; height: 44px;
    border-radius: 13px;
    background: linear-gradient(135deg, #7c6af7, #f76a8a);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 28px;
  }

  .heading {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #e8e8ec;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .subheading {
    font-size: 14px;
    color: #6b6b7a;
    margin-bottom: 32px;
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #9999aa;
    margin-bottom: 7px;
    letter-spacing: 0.01em;
  }

  input[type="email"],
  input[type="password"],
  input[type="text"], 
  input[type="number"] {
    width: 100%;
    height: 46px;
    background: #1e1e22;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 0 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #e8e8ec;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: #4a4a58; }
  input:focus {
    border-color: rgba(124,106,247,0.5);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.1);
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }
  .field-row label { margin-bottom: 0; }

  .forgot {
    font-size: 12px;
    color: #7c6af7;
    text-decoration: none;
    transition: color 0.2s;
  }
  .forgot:hover { color: #a78bfa; }

  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 44px; }

  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; color: #4a4a58;
    font-size: 16px; padding: 4px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: #9999aa; }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 26px;
    font-size: 13px;
    color: #6b6b7a;
    cursor: pointer;
  }
  .remember input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #7c6af7;
    cursor: pointer;
  }

  button[type="submit"] {
    width: 100%;
    height: 48px;
    background: linear-gradient(135deg, #7c6af7, #a78bfa);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.2s, transform 0.15s;
  }
  button[type="submit"]:hover { opacity: 0.92; transform: translateY(-1px); }
  button[type="submit"]:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: #3a3a45;
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .footer {
    text-align: center;
    font-size: 13px;
    color: #6b6b7a;
    margin-top: 24px;
  }
  .footer a {
    color: #7c6af7;
    text-decoration: none;
    font-weight: 500;
  }
  .footer a:hover { color: #a78bfa; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">💬</div>
  <div class="heading">Welcome back</div>
  <div class="subheading">Sign in to continue to ChatApp</div>

  <form action="/login" method="POST">

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required/>
    </div>
    
    <div class="field">
        <div class="field-row">
            <label for="password">Password</label>
            <a href="/forgot-password" class="forgot">Forgot password?</a>
        </div>
        <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            <button type="button" class="eye-btn" id="togglePwd" title="Show/hide password">👁</button>
        </div>
    </div>
    <div class="field">
      <label for="roomId">RoomId</label>
      <input type="number" id="roomId" name="roomId" placeholder="0" required/>
    </div>

    <label class="remember">
      <input type="checkbox" name="remember"/>
      Keep me signed in
    </label>

    <button type="submit">Sign in</button>

  </form>

  <div class="divider">or</div>

  <div class="footer">
    Don't have an account? <a href="/signup">Create one</a>
  </div>
</div>

<script>
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const isHidden = pwd.type === 'password';
    pwd.type = isHidden ? 'text' : 'password';
    this.textContent = isHidden ? '👁️' : '👁';
  });
</script>

</body>
</html>
